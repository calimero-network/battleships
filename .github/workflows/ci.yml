name: CI

on:
  push:
    branches: [master]
    paths:
      - "app/**"
      - "logic/**"
      - "e2e/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/ci.yml"

  pull_request:
    branches: [master]
    paths:
      - "app/**"
      - "logic/**"
      - "e2e/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/ci.yml"

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # Job 1: Frontend — Lint, Typecheck, Build
  # ============================================================
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm --dir app install --frozen-lockfile

      - name: Lint
        run: pnpm --dir app lint

      - name: Typecheck
        if: ${{ !cancelled() }}
        run: pnpm --dir app exec tsc --noEmit

      - name: Build
        if: ${{ !cancelled() }}
        run: pnpm --dir app build

      - name: Test
        if: ${{ !cancelled() }}
        run: pnpm --dir app test

  # ============================================================
  # Job 2: Logic — Rust Format, Clippy, WASM Build
  # ============================================================
  logic:
    name: Logic (Rust)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            logic/target
          key: logic-${{ runner.os }}-${{ hashFiles('logic/Cargo.toml') }}
          restore-keys: logic-${{ runner.os }}-

      - name: Cargo format
        working-directory: logic
        run: cargo fmt --check

      - name: Cargo clippy
        if: ${{ !cancelled() }}
        working-directory: logic
        run: cargo clippy --target wasm32-unknown-unknown -- -D warnings

      - name: Build WASM
        if: ${{ !cancelled() }}
        working-directory: logic
        run: cargo build --target wasm32-unknown-unknown --profile app-release

  # ============================================================
  # Job 3: E2E — Merobox Battleships Workflow
  # ============================================================
  e2e:
    name: E2E (Merobox)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install merobox
        run: |
          pip install "merobox @ git+https://github.com/calimero-network/merobox.git@master"
          pip install --force-reinstall --no-deps "calimero-client-py @ git+https://github.com/calimero-network/calimero-client-py.git@master"
          merobox --version

      - name: Run Battleships E2E Workflow
        id: run_e2e
        run: |
          mkdir -p docker-logs
          cd e2e
          max_attempts=2
          attempt=1
          success=false

          while [ $attempt -le $max_attempts ]; do
              if [ $attempt -gt 1 ]; then
                  echo "Retry attempt $attempt..."
                  merobox stop --all || true
                  merobox nuke --force || true
                  sleep 2
              fi

              if merobox bootstrap run \
                  "workflow-battleships-e2e.yml" \
                  --e2e-mode; then
                  success=true
                  break
              else
                  echo "Collecting Docker logs for attempt $attempt"
                  for container in $(docker ps -a --format "{{.Names}}" 2>/dev/null || true); do
                      if [ -n "$container" ]; then
                          docker logs "$container" > "$GITHUB_WORKSPACE/docker-logs/e2e-attempt${attempt}-${container}.log" 2>&1 || true
                      fi
                  done
                  attempt=$((attempt + 1))
              fi
          done

          merobox stop --all || true
          merobox nuke --force || true

          if [ "$success" = false ]; then
              echo "failed=true" >> $GITHUB_OUTPUT
              exit 1
          fi

      - name: Upload Docker logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-docker-logs-${{ github.sha }}
          path: docker-logs/
          retention-days: 7
          if-no-files-found: ignore
