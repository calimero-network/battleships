name: Battleships E2E — Namespace + Lobby + Match + Gameplay
description: >
  Full end-to-end test of the battleships app using the namespace model.
  Two nodes: node-1 creates a namespace, lobby context, and match;
  node-2 joins via namespace invitation. Both players place ships,
  exchange shots, and verify state sync across nodes.

force_pull_image: true

nodes:
  count: 2
  image: ghcr.io/calimero-network/merod:edge
  prefix: calimero-node

steps:
  # ============================================================
  # Phase A: Bootstrap — Install, Namespace, Lobby
  # ============================================================

  - name: Install Battleships App on Node 1
    type: install_application
    node: calimero-node-1
    path: ../logic/res/battleships-0.3.0.mpk
    dev: true
    outputs:
      app_id: applicationId

  - name: Create Namespace on Node 1
    type: create_namespace
    node: calimero-node-1
    application_id: '{{app_id}}'
    outputs:
      namespace_id: namespaceId

  - name: Create Lobby Context in Namespace
    type: create_context
    node: calimero-node-1
    application_id: '{{app_id}}'
    group_id: '{{namespace_id}}'
    service_name: lobby
    outputs:
      lobby_ctx_id: contextId
      p1_key: memberPublicKey

  - name: Assert Lobby Context Created
    type: assert
    statements:
      - 'is_set({{lobby_ctx_id}})'
      - 'is_set({{p1_key}})'

  - name: Create Namespace Invitation
    type: create_namespace_invitation
    node: calimero-node-1
    namespace_id: '{{namespace_id}}'
    outputs:
      invitation: invitation

  - name: Wait for Namespace Gossip Propagation
    type: wait
    seconds: 10
    message: Waiting for namespace gossip to reach node 2

  - name: Node 2 Joins Namespace
    type: join_namespace
    node: calimero-node-2
    namespace_id: '{{namespace_id}}'
    invitation: '{{invitation}}'
    outputs:
      p2_identity: memberIdentity

  - name: Node 2 Joins Lobby Context
    type: join_context
    node: calimero-node-2
    context_id: '{{lobby_ctx_id}}'
    outputs:
      lobby_ctx_id_node2: contextId
      p2_key: memberPublicKey

  - name: Assert Node 2 Joined
    type: assert
    statements:
      - 'is_set({{p2_key}})'
      - 'is_set({{p2_identity}})'

  - name: Wait for Lobby Sync
    type: wait_for_sync
    nodes:
      - calimero-node-1
      - calimero-node-2
    context_id: '{{lobby_ctx_id}}'
    timeout: 30

  # ============================================================
  # Phase B: Match Creation
  # ============================================================

  - name: Node 1 Creates Match in Lobby
    type: call
    node: calimero-node-1
    context_id: '{{lobby_ctx_id}}'
    method: create_match
    executor_public_key: '{{p1_key}}'
    args:
      player2: '{{p2_key}}'
    outputs:
      match_id: result.output

  - name: Assert Match ID Allocated
    type: assert
    statements:
      - 'is_set({{match_id}})'

  # Negative-path coverage for create_match validation (added for the
  # CRDT migration — self-match rejection and malformed-base58 rejection).
  - name: Reject Self-Match Creation
    type: call
    node: calimero-node-1
    context_id: '{{lobby_ctx_id}}'
    method: create_match
    executor_public_key: '{{p1_key}}'
    args:
      player2: '{{p1_key}}'
    expected_failure: true

  - name: Reject Non-Base58 Player2
    type: call
    node: calimero-node-1
    context_id: '{{lobby_ctx_id}}'
    method: create_match
    executor_public_key: '{{p1_key}}'
    args:
      player2: '!!!not-a-valid-base58-key!!!'
    expected_failure: true

  # The frontend creates a per-match subgroup inside the namespace, then
  # creates the match context inside that subgroup. Mirror that flow here.
  - name: Create Match Subgroup in Namespace
    type: create_group_in_namespace
    node: calimero-node-1
    namespace_id: '{{namespace_id}}'
    group_alias: 'match-{{match_id}}'
    outputs:
      match_subgroup_id: groupId

  - name: Assert Match Subgroup Created
    type: assert
    statements:
      - 'is_set({{match_subgroup_id}})'

  - name: Wait for Subgroup Governance Propagation
    type: wait
    seconds: 5
    message: Waiting for subgroup governance to propagate to node 2

  - name: Add Node 2 to Match Subgroup
    type: add_group_members
    node: calimero-node-1
    group_id: '{{match_subgroup_id}}'
    members:
      - identity: '{{p2_identity}}'
        role: Member

  - name: Create Match Context in Subgroup
    type: create_context
    node: calimero-node-1
    application_id: '{{app_id}}'
    group_id: '{{match_subgroup_id}}'
    service_name: game
    params: '{"player1":"{{p1_key}}","player2":"{{p2_key}}","lobby_context_id":"{{lobby_ctx_id}}","match_id":"{{match_id}}"}'
    outputs:
      match_ctx_id: contextId
      match_p1_key: memberPublicKey

  - name: Assert Match Context Created
    type: assert
    statements:
      - 'is_set({{match_ctx_id}})'

  - name: Link Match Context to Lobby
    type: call
    node: calimero-node-1
    context_id: '{{lobby_ctx_id}}'
    method: set_match_context_id
    executor_public_key: '{{p1_key}}'
    args:
      match_id: '{{match_id}}'
      context_id: '{{match_ctx_id}}'

  # CRDT convergence check (review point 6, e2e side):
  # The Pending → Active transition in MatchSummary just happened on node-1.
  # After lobby-context sync, node-2 should also see the match list with the
  # updated entry. If MatchSummary::merge ever silently regresses (e.g. drops
  # the status update or context_id), this assertion catches it on the
  # second-node read.
  - name: Wait for Lobby Status Sync
    type: wait_for_sync
    nodes:
      - calimero-node-1
      - calimero-node-2
    context_id: '{{lobby_ctx_id}}'
    timeout: 30

  - name: Verify Status Transition Propagated to Node 2
    type: call
    node: calimero-node-2
    context_id: '{{lobby_ctx_id}}'
    method: get_matches
    executor_public_key: '{{p2_key}}'
    outputs:
      matches_after_link_n2: result.output

  - name: Assert Status Transition Visible on Node 2
    type: assert
    statements:
      - 'is_set({{matches_after_link_n2}})'

  # Wait for subgroup membership + match context registration to propagate before node-2 joins
  - name: Wait for Subgroup and Context Propagation
    type: wait
    seconds: 10
    message: Waiting for subgroup membership and match context registration to propagate

  - name: Node 2 Joins Match Context
    type: join_context
    node: calimero-node-2
    context_id: '{{match_ctx_id}}'
    outputs:
      match_ctx_id_node2: contextId
      match_p2_key: memberPublicKey

  - name: Wait for Match Context Sync
    type: wait_for_sync
    nodes:
      - calimero-node-1
      - calimero-node-2
    context_id: '{{match_ctx_id}}'
    timeout: 30

  # ============================================================
  # Phase C: Gameplay — Ship Placement
  # ============================================================

  - name: Wait for Gossipsub Mesh Formation
    type: wait
    seconds: 10
    message: Waiting for gossipsub mesh to form on match context topic between nodes

  # The match context generates its own match_id during init (different from the lobby's).
  - name: Get Active Match ID from Match Context
    type: call
    node: calimero-node-1
    context_id: '{{match_ctx_id}}'
    method: get_active_match_id
    executor_public_key: '{{match_p1_key}}'
    args: {}
    outputs:
      game_match_id: result.output

  - name: Assert Game Match ID
    type: assert
    statements:
      - 'is_set({{game_match_id}})'

  # Player 1 fleet: 1x2, 2x3, 1x4, 1x5 — spread on rows 0,2,4,6,8
  # Ships cannot touch (including diagonals)
  - name: Player 1 Places Ships
    type: call
    node: calimero-node-1
    context_id: '{{match_ctx_id}}'
    method: place_ships
    executor_public_key: '{{match_p1_key}}'
    args:
      match_id: '{{game_match_id}}'
      ships:
        - '0,0;1,0'
        - '0,2;1,2;2,2'
        - '0,4;1,4;2,4'
        - '0,6;1,6;2,6;3,6'
        - '0,8;1,8;2,8;3,8;4,8'

  - name: Wait for Ship Placement Sync (P1)
    type: wait_for_sync
    nodes:
      - calimero-node-1
      - calimero-node-2
    context_id: '{{match_ctx_id}}'
    timeout: 30

  # Player 2 fleet: same pattern but on the right side of the board
  - name: Player 2 Places Ships
    type: call
    node: calimero-node-2
    context_id: '{{match_ctx_id}}'
    method: place_ships
    executor_public_key: '{{match_p2_key}}'
    args:
      match_id: '{{game_match_id}}'
      ships:
        - '8,0;9,0'
        - '7,2;8,2;9,2'
        - '7,4;8,4;9,4'
        - '6,6;7,6;8,6;9,6'
        - '5,8;6,8;7,8;8,8;9,8'

  - name: Wait for Ship Placement Sync (P2)
    type: wait_for_sync
    nodes:
      - calimero-node-1
      - calimero-node-2
    context_id: '{{match_ctx_id}}'
    timeout: 30

  # Reject a second place_ships from the same player — commitment is
  # write-once per executor (CRDT migration: AlreadyCommitted guard).
  - name: Reject Second Placement by P1 (AlreadyCommitted)
    type: call
    node: calimero-node-1
    context_id: '{{match_ctx_id}}'
    method: place_ships
    executor_public_key: '{{match_p1_key}}'
    args:
      match_id: '{{game_match_id}}'
      ships:
        - '0,0;1,0'
        - '0,2;1,2;2,2'
        - '0,4;1,4;2,4'
        - '0,6;1,6;2,6;3,6'
        - '0,8;1,8;2,8;3,8;4,8'
    expected_failure: true

  # Verify cross-device durability hooks: export returns board_bytes + salt,
  # keyed against the caller's published commitment.
  - name: Export Board Seed for P1
    type: call
    node: calimero-node-1
    context_id: '{{match_ctx_id}}'
    method: export_board_seed
    executor_public_key: '{{match_p1_key}}'
    args:
      match_id: '{{game_match_id}}'
    outputs:
      p1_seed: result.output

  - name: Assert P1 Seed Exported
    type: assert
    statements:
      - 'is_set({{p1_seed}})'

  - name: Export Board Seed for P2
    type: call
    node: calimero-node-2
    context_id: '{{match_ctx_id}}'
    method: export_board_seed
    executor_public_key: '{{match_p2_key}}'
    args:
      match_id: '{{game_match_id}}'
    outputs:
      p2_seed: result.output

  - name: Assert P2 Seed Exported
    type: assert
    statements:
      - 'is_set({{p2_seed}})'

  # Verify board state after placement
  - name: Player 1 Checks Own Board
    type: call
    node: calimero-node-1
    context_id: '{{match_ctx_id}}'
    method: get_own_board
    executor_public_key: '{{match_p1_key}}'
    args:
      match_id: '{{game_match_id}}'
    outputs:
      p1_board: result.output

  - name: Assert P1 Board Has Ships
    type: assert
    statements:
      - 'is_set({{p1_board}})'

  # ============================================================
  # Phase D: Gameplay — Shooting Round 1
  # ============================================================

  # Player 1's turn — shoot at P2's ship at (8,0).
  # acknowledge_shot_handler auto-fires on node-2 when the ShotProposed
  # delta arrives via gossipsub broadcast (no manual ack needed).
  - name: Player 1 Proposes Shot at (8,0)
    type: call
    node: calimero-node-1
    context_id: '{{match_ctx_id}}'
    method: propose_shot
    executor_public_key: '{{match_p1_key}}'
    args:
      match_id: '{{game_match_id}}'
      x: 8
      y: 0

  - name: Wait for Shot Resolution Sync (P1 shot + P2 auto-ack)
    type: wait_for_sync
    nodes:
      - calimero-node-1
      - calimero-node-2
    context_id: '{{match_ctx_id}}'
    timeout: 30

  # Verify P1's shots board shows the resolved hit
  - name: Player 1 Checks Shots Board
    type: call
    node: calimero-node-1
    context_id: '{{match_ctx_id}}'
    method: get_shots
    executor_public_key: '{{match_p1_key}}'
    args:
      match_id: '{{game_match_id}}'
    outputs:
      p1_shots: result.output

  - name: Assert P1 Shots Recorded
    type: assert
    statements:
      - 'is_set({{p1_shots}})'

  # Player 2's turn — shoot at P1's ship at (0,0).
  # acknowledge_shot_handler auto-fires on node-1 when the delta arrives.
  - name: Player 2 Proposes Shot at (0,0)
    type: call
    node: calimero-node-2
    context_id: '{{match_ctx_id}}'
    method: propose_shot
    executor_public_key: '{{match_p2_key}}'
    args:
      match_id: '{{game_match_id}}'
      x: 0
      y: 0

  - name: Wait for Shot Resolution Sync (P2 shot + P1 auto-ack)
    type: wait_for_sync
    nodes:
      - calimero-node-1
      - calimero-node-2
    context_id: '{{match_ctx_id}}'
    timeout: 30

  # ============================================================
  # Phase E: Final Verification
  # ============================================================

  - name: Verify Turn Tracking on Node 1
    type: call
    node: calimero-node-1
    context_id: '{{match_ctx_id}}'
    method: get_current_turn
    executor_public_key: '{{match_p1_key}}'
    outputs:
      current_turn: result.output

  - name: Assert Turn Is Tracked
    type: assert
    statements:
      - 'is_set({{current_turn}})'

  # CRDT convergence check (review point 6, e2e side):
  # The `turn` LwwRegister has been set by both `propose_shot` (P1) and
  # the auto-fired `acknowledge_shot_handler` (P2). After match-context
  # sync, node-2 should agree on the same current turn. If LwwRegister
  # merge ever drops the latest write, this read on the second node fails.
  - name: Verify Turn Tracking on Node 2 (CRDT convergence)
    type: call
    node: calimero-node-2
    context_id: '{{match_ctx_id}}'
    method: get_current_turn
    executor_public_key: '{{match_p2_key}}'
    outputs:
      current_turn_n2: result.output

  - name: Assert Turn Visible on Node 2
    type: assert
    statements:
      - 'is_set({{current_turn_n2}})'

  # Same idea for the shot map: P1's shot at (8,0) was inserted into
  # `shots_p1: UnorderedMap<[u8;1], LwwRegister<u8>>` on node-1 then
  # resolved to Hit by the auto-ack on node-2. Both nodes must see the
  # final cell value after sync.
  - name: Verify P2's Shots Visible on Node 2 (CRDT convergence)
    type: call
    node: calimero-node-2
    context_id: '{{match_ctx_id}}'
    method: get_shots
    executor_public_key: '{{match_p2_key}}'
    args:
      match_id: '{{game_match_id}}'
    outputs:
      p2_shots_n2: result.output

  - name: Assert P2 Shots Visible on Node 2
    type: assert
    statements:
      - 'is_set({{p2_shots_n2}})'

  # NOTE: pure parallel-write CRDT testing (e.g. two nodes simultaneously
  # writing different keys to the same UnorderedMap and asserting both
  # entries survive merge) requires concurrent step execution. merobox
  # workflows are sequential, so divergence-then-merge testing on the
  # same key lives in the Rust unit tests (`mod tests` in lobby/src/lib.rs)
  # rather than here.

  - name: Verify Match List on Node 1 (Lobby)
    type: call
    node: calimero-node-1
    context_id: '{{lobby_ctx_id}}'
    method: get_matches
    executor_public_key: '{{p1_key}}'
    outputs:
      matches_n1: result.output

  - name: Assert Matches Exist on Node 1
    type: assert
    statements:
      - 'is_set({{matches_n1}})'

  - name: Verify Match List on Node 2 (Lobby)
    type: call
    node: calimero-node-2
    context_id: '{{lobby_ctx_id}}'
    method: get_matches
    executor_public_key: '{{p2_key}}'
    outputs:
      matches_n2: result.output

  - name: Assert Matches Exist on Node 2
    type: assert
    statements:
      - 'is_set({{matches_n2}})'

  # ============================================================
  # Phase F: Commitment Scheme — Reveal & Audit
  # ============================================================
  # Both players reveal their pristine boards and the contract recomputes
  # SHA256(pristine || salt) against the published commitment AND replays
  # every shot recorded against them against the revealed board. This is
  # the same audit path exercised at match end on the winning shot.

  - name: Player 1 Reveals Board (Audit)
    type: call
    node: calimero-node-1
    context_id: '{{match_ctx_id}}'
    method: reveal_board
    executor_public_key: '{{match_p1_key}}'
    args:
      match_id: '{{game_match_id}}'

  - name: Player 2 Reveals Board (Audit)
    type: call
    node: calimero-node-2
    context_id: '{{match_ctx_id}}'
    method: reveal_board
    executor_public_key: '{{match_p2_key}}'
    args:
      match_id: '{{game_match_id}}'

  # Reject relinking an already-Active match — set_match_context_id now
  # guards against any non-Pending transition (prevents Finished matches
  # being silently reactivated).
  - name: Reject Re-Link of Active Match
    type: call
    node: calimero-node-1
    context_id: '{{lobby_ctx_id}}'
    method: set_match_context_id
    executor_public_key: '{{p1_key}}'
    args:
      match_id: '{{match_id}}'
      context_id: '{{match_ctx_id}}'
    expected_failure: true

  # ============================================================
  # Phase G: Complete the Game — 31 more shots in varied order
  # ============================================================
  # Rationale: the original Phase D asserted ONE round (1 shot each).
  # This phase plays the match to completion to cover:
  #   (a) full 17-hit win condition and `winner` LwwRegister transition,
  #   (b) Event::Winner / Event::MatchEnded emission and `on_match_finished`
  #       xcall back to the lobby,
  #   (c) MatchSummary.status: Active → Finished convergence across nodes,
  #   (d) post-finish behaviour (further propose_shot must be rejected with
  #       GameError::Finished).
  #
  # Shot choreography:
  #   - P1 needs 17 hits on P2 ship cells to win. P1 already has 1 hit at
  #     (8,0) from Phase D. Remaining 16 P2 ship cells are fired at in a
  #     deliberately mixed order (not a straight sweep) — alternating
  #     between ships, revisiting different rows, to exercise the shot-map
  #     LwwRegister merge under interleaved writes.
  #   - P2 takes 15 shots between P1's remaining 16 (strict turn alternation).
  #     P2's mix is ~10 hits + 5 misses on varied cells; P1 still has ≥ 1
  #     unhit cell when the match ends, so P1 wins cleanly.
  #   - `wait_for_sync` between every turn is load-bearing: each shot
  #     flips the turn LwwRegister, and the next node's propose_shot
  #     will reject with "not your turn" if it reads stale state.

  - name: Turn 3 — P1 Shot (9,0) [hit, sinks P2 destroyer]
    type: call
    node: calimero-node-1
    context_id: '{{match_ctx_id}}'
    method: propose_shot
    executor_public_key: '{{match_p1_key}}'
    args: { match_id: '{{game_match_id}}', x: 9, y: 0 }

  - name: Sync After Turn 3
    type: wait_for_sync
    nodes: [calimero-node-1, calimero-node-2]
    context_id: '{{match_ctx_id}}'
    timeout: 30

  - name: Turn 4 — P2 Shot (1,0) [hit, sinks P1 destroyer]
    type: call
    node: calimero-node-2
    context_id: '{{match_ctx_id}}'
    method: propose_shot
    executor_public_key: '{{match_p2_key}}'
    args: { match_id: '{{game_match_id}}', x: 1, y: 0 }

  - name: Sync After Turn 4
    type: wait_for_sync
    nodes: [calimero-node-1, calimero-node-2]
    context_id: '{{match_ctx_id}}'
    timeout: 30

  - name: Turn 5 — P1 Shot (5,8) [hit on carrier, jumps rows]
    type: call
    node: calimero-node-1
    context_id: '{{match_ctx_id}}'
    method: propose_shot
    executor_public_key: '{{match_p1_key}}'
    args: { match_id: '{{game_match_id}}', x: 5, y: 8 }

  - name: Sync After Turn 5
    type: wait_for_sync
    nodes: [calimero-node-1, calimero-node-2]
    context_id: '{{match_ctx_id}}'
    timeout: 30

  - name: Turn 6 — P2 Shot (5,5) [miss]
    type: call
    node: calimero-node-2
    context_id: '{{match_ctx_id}}'
    method: propose_shot
    executor_public_key: '{{match_p2_key}}'
    args: { match_id: '{{game_match_id}}', x: 5, y: 5 }

  - name: Sync After Turn 6
    type: wait_for_sync
    nodes: [calimero-node-1, calimero-node-2]
    context_id: '{{match_ctx_id}}'
    timeout: 30

  - name: Turn 7 — P1 Shot (7,2) [hit on P2 cruiser]
    type: call
    node: calimero-node-1
    context_id: '{{match_ctx_id}}'
    method: propose_shot
    executor_public_key: '{{match_p1_key}}'
    args: { match_id: '{{game_match_id}}', x: 7, y: 2 }

  - name: Sync After Turn 7
    type: wait_for_sync
    nodes: [calimero-node-1, calimero-node-2]
    context_id: '{{match_ctx_id}}'
    timeout: 30

  - name: Turn 8 — P2 Shot (0,2) [hit on P1 cruiser]
    type: call
    node: calimero-node-2
    context_id: '{{match_ctx_id}}'
    method: propose_shot
    executor_public_key: '{{match_p2_key}}'
    args: { match_id: '{{game_match_id}}', x: 0, y: 2 }

  - name: Sync After Turn 8
    type: wait_for_sync
    nodes: [calimero-node-1, calimero-node-2]
    context_id: '{{match_ctx_id}}'
    timeout: 30

  - name: Turn 9 — P1 Shot (6,8) [hit, continuing carrier]
    type: call
    node: calimero-node-1
    context_id: '{{match_ctx_id}}'
    method: propose_shot
    executor_public_key: '{{match_p1_key}}'
    args: { match_id: '{{game_match_id}}', x: 6, y: 8 }

  - name: Sync After Turn 9
    type: wait_for_sync
    nodes: [calimero-node-1, calimero-node-2]
    context_id: '{{match_ctx_id}}'
    timeout: 30

  - name: Turn 10 — P2 Shot (3,3) [miss]
    type: call
    node: calimero-node-2
    context_id: '{{match_ctx_id}}'
    method: propose_shot
    executor_public_key: '{{match_p2_key}}'
    args: { match_id: '{{game_match_id}}', x: 3, y: 3 }

  - name: Sync After Turn 10
    type: wait_for_sync
    nodes: [calimero-node-1, calimero-node-2]
    context_id: '{{match_ctx_id}}'
    timeout: 30

  - name: Turn 11 — P1 Shot (7,4) [hit on P2 submarine]
    type: call
    node: calimero-node-1
    context_id: '{{match_ctx_id}}'
    method: propose_shot
    executor_public_key: '{{match_p1_key}}'
    args: { match_id: '{{game_match_id}}', x: 7, y: 4 }

  - name: Sync After Turn 11
    type: wait_for_sync
    nodes: [calimero-node-1, calimero-node-2]
    context_id: '{{match_ctx_id}}'
    timeout: 30

  - name: Turn 12 — P2 Shot (1,2) [hit, continuing P1 cruiser]
    type: call
    node: calimero-node-2
    context_id: '{{match_ctx_id}}'
    method: propose_shot
    executor_public_key: '{{match_p2_key}}'
    args: { match_id: '{{game_match_id}}', x: 1, y: 2 }

  - name: Sync After Turn 12
