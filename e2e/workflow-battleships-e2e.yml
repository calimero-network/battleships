    context_id: '{{match_ctx_id}}'
    timeout: 30

  # Turn 33: P1's 17th hit. This sinks P2's carrier's last cell,
  # drives `ships_remaining` to 0 on node-2's private board, sets
  # winner=P1, emits Event::Winner + Event::MatchEnded, and xcalls
  # `on_match_finished` back to the lobby context.
  - name: Turn 33 — P1 Shot (9,8) [WINNING HIT, sinks P2 carrier]
    type: call
    node: calimero-node-1
    context_id: '{{match_ctx_id}}'
    method: propose_shot
    executor_public_key: '{{match_p1_key}}'
    args: { match_id: '{{game_match_id}}', x: 9, y: 8 }

  - name: Sync After Match-End Shot
    type: wait_for_sync
    nodes: [calimero-node-1, calimero-node-2]
    context_id: '{{match_ctx_id}}'
    timeout: 30

  # Give the cross-context xcall (match -> lobby) a beat to apply.
  - name: Wait for on_match_finished xcall Propagation
    type: wait
    seconds: 5
    message: Waiting for match->lobby xcall to land on both nodes

  - name: Sync Lobby After Match End
    type: wait_for_sync
    nodes: [calimero-node-1, calimero-node-2]
    context_id: '{{lobby_ctx_id}}'
    timeout: 30

  # ============================================================
  # Phase H: Post-Match Assertions
  # ============================================================

  # A propose_shot on a finished match must be rejected with
  # GameError::Finished — the same guard the frontend catches on
  # `{"kind":"Finished"}`. Run it from BOTH nodes to cover both
  # the ex-winner and ex-loser paths.
  - name: Reject Post-Match Shot from P1
    type: call
    node: calimero-node-1
    context_id: '{{match_ctx_id}}'
    method: propose_shot
    executor_public_key: '{{match_p1_key}}'
    args: { match_id: '{{game_match_id}}', x: 0, y: 0 }
    expected_failure: true

  - name: Reject Post-Match Shot from P2
    type: call
    node: calimero-node-2
    context_id: '{{match_ctx_id}}'
    method: propose_shot
    executor_public_key: '{{match_p2_key}}'
    args: { match_id: '{{game_match_id}}', x: 5, y: 5 }
    expected_failure: true

  # The lobby should now show the match as Finished with P1 as the
  # winner. Read from BOTH nodes to confirm the xcall + summary merge
  # converged across the cluster.
  - name: Read Finished Match Summary on Node 1
    type: call
    node: calimero-node-1
    context_id: '{{lobby_ctx_id}}'
    method: get_matches
    executor_public_key: '{{p1_key}}'
    outputs:
      final_matches_n1: result.output

  - name: Assert Final Match List on Node 1
    type: assert
    statements:
      - 'is_set({{final_matches_n1}})'

  - name: Read Finished Match Summary on Node 2
    type: call
    node: calimero-node-2
    context_id: '{{lobby_ctx_id}}'
    method: get_matches
    executor_public_key: '{{p2_key}}'
    outputs:
      final_matches_n2: result.output

  - name: Assert Final Match List on Node 2
    type: assert
    statements:
      - 'is_set({{final_matches_n2}})'

  # Per-player stats should reflect one additional win/loss after
  # on_match_finished applied the MatchRecord and bumped the counters.
  - name: Read Player 1 Stats (should record the win)
    type: call
    node: calimero-node-1
    context_id: '{{lobby_ctx_id}}'
    method: get_player_stats
    executor_public_key: '{{p1_key}}'
    args: { player: '{{p1_key}}' }
    outputs:
      p1_stats: result.output

  - name: Assert P1 Stats Set
    type: assert
    statements:
      - 'is_set({{p1_stats}})'

  - name: Read Player 2 Stats (should record the loss)
    type: call
    node: calimero-node-2
    context_id: '{{lobby_ctx_id}}'
    method: get_player_stats
    executor_public_key: '{{p2_key}}'
    args: { player: '{{p2_key}}' }
    outputs:
      p2_stats: result.output

  - name: Assert P2 Stats Set
    type: assert
    statements:
      - 'is_set({{p2_stats}})'

stop_all_nodes: false
